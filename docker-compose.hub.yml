# =============================================================================
# AIDA — Docker Hub (pre-built images, no git clone needed)
# =============================================================================
#
# Local-only quick start (HTTP, no TLS — fine for personal use on this machine):
#   curl -fsSL https://raw.githubusercontent.com/Archsec-Emman/AIDA/main/docker-compose.hub.yml -o docker-compose.yml
#   docker compose up -d
#   open http://localhost:31337
#
# LAN sharing (HTTP — acceptable on a trusted home/office network):
#   FRONTEND_BIND=0.0.0.0 docker compose up -d
#
# For HTTPS (LAN with cert, or public domain with Let's Encrypt), use the git
# repo and ./start.sh which adds Caddy as a TLS reverse proxy:
#   git clone https://github.com/Arc-Cyber-Arsenal/Nemesis.git && cd AIDA
#   ./start.sh --lan                          # https://<LAN_IP>
#   ./start.sh --domain aida.example.com      # https://aida.example.com (Let's Encrypt)
#
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: aida_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aida
      POSTGRES_PASSWORD: aida_secure_password_change_me
      POSTGRES_DB: aida_assessments
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aida-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aida"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Docker Socket Proxy — filtered Docker API for the backend.
  # Only inspect/exec/start allowed; run/create/volumes blocked.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    container_name: aida_docker_proxy
    restart: unless-stopped
    environment:
      POST: 1
      CONTAINERS: 1
      EXEC: 1
      IMAGES: 0
      VOLUMES: 0
      NETWORKS: 0
      SERVICES: 0
      TASKS: 0
      NODES: 0
      SWARM: 0
      BUILD: 0
      AUTH: 0
      SECRETS: 0
      PLUGINS: 0
      INFO: 0
      VERSION: 0
      EVENTS: 0
      DISTRIBUTION: 0
      SYSTEM: 0
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - aida-network

  backend:
    image: vasco0x4/aida-backend:latest
    container_name: aida_backend
    restart: unless-stopped
    environment:
      POSTGRES_USER: aida
      POSTGRES_PASSWORD: aida_secure_password_change_me
      POSTGRES_DB: aida_assessments
      POSTGRES_HOST: postgres
      BACKEND_CORS_ORIGINS: "http://localhost:31337,http://127.0.0.1:31337"
      ENVIRONMENT: production
      DEFAULT_CONTAINER_NAME: aida-pentest
      CONTAINER_WORKSPACE_BASE: /workspace
      DOCKER_HOST: tcp://docker-proxy:2375
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - backend_logs:/app/logs
    networks:
      - aida-network
    depends_on:
      postgres:
        condition: service_healthy
      docker-proxy:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: vasco0x4/aida-frontend:latest
    container_name: aida_frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_BIND:-127.0.0.1}:31337:80"
    networks:
      - aida-network
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  aida-pentest:
    image: vasco0x4/aida-pentest:latest
    container_name: aida-pentest
    restart: unless-stopped
    tty: true
    stdin_open: true
    volumes:
      - workspaces:/workspace
    networks:
      - pentest-network

volumes:
  postgres_data:
    name: aida_postgres_data
  backend_logs:
  workspaces:

networks:
  aida-network:
    name: aida-network
    driver: bridge
  pentest-network:
    name: aida-pentest-network
    driver: bridge
