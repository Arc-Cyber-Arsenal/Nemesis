# TLS overlay — used by ./start.sh --lan and ./start.sh --domain
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.tls.yml up -d
#
# What it does:
#   - Adds Caddy as a TLS-terminating reverse proxy on ports 443/80.
#   - Removes the frontend's host port binding (Nginx becomes internal,
#     reachable only by Caddy via the Docker network).
#   - The Caddyfile is generated dynamically by start.sh into .aida/Caddyfile
#     based on the chosen mode:
#       --lan          → tls internal (Caddy local CA, browser warning OK)
#       --domain X.Y   → email + ACME (Let's Encrypt, real cert)
#
# This file is NOT loaded for the default ./start.sh — that mode uses
# Nginx on 31337 directly with no TLS (localhost-only is safe).

services:
  frontend:
    # Drop the host port mapping inherited from prod.yml. Nginx remains
    # available internally as `frontend:80` for Caddy.
    ports: !reset []

  caddy:
    image: caddy:2-alpine
    container_name: aida_caddy
    restart: unless-stopped
    ports:
      - "${CADDY_BIND:-0.0.0.0}:443:443"
      - "${CADDY_BIND:-0.0.0.0}:80:80"
    volumes:
      - ./.aida/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - aida-network
    depends_on:
      frontend:
        condition: service_started
    healthcheck:
      # `wget --spider http://127.0.0.1:80/` returns 0 on the 301 redirect
      # that Caddy serves on port 80, which is enough to confirm liveness.
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  caddy_data:
    name: aida_caddy_data
  caddy_config:
    name: aida_caddy_config
